# Place inside your Nginx server block for custosell-api.custospark.com
# Responds to OPTIONS preflight directly — never hits Laravel, never blocked by proxies.

if ($request_method = 'OPTIONS') {
    add_header 'Access-Control-Allow-Origin'  '*';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Business-Id, X-User-Id, X-Requested-With, Accept';
    add_header 'Access-Control-Max-Age'       '86400';
    add_header 'Content-Type'                 'text/plain charset=UTF-8';
    add_header 'Content-Length'               '0';
    return 204;
}
